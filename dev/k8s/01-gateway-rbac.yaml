---
# ServiceAccount vault-gateway uses for in-cluster API calls.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-gateway
  namespace: vault-system
---
# Allows vault-gateway to validate pod ServiceAccount JWTs via TokenReview API.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-gateway
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-gateway
subjects:
  - kind: ServiceAccount
    name: vault-gateway
    namespace: vault-system
