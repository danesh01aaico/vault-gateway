{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vault-gateway.fullname" . }}
  labels:
    {{- include "vault-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "vault-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow the Vault-compatible API (8200) from any namespace.
    # This covers application pods and the Bank-Vaults webhook.
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    # Allow metrics scraping (9090) only from the Prometheus namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.networkPolicy.prometheusNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.metricsPort }}
{{- end }}
