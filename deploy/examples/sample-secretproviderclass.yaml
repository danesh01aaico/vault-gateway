# Example SecretProviderClass for the Secrets Store CSI Driver, using its
# HashiCorp Vault provider pointed at vault-gateway. Mount the resulting volume
# into a pod to expose gateway-backed secrets as files (and optionally sync
# them into a Kubernetes Secret).
#
# Requires: secrets-store-csi-driver + the vault CSI provider installed.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: vault-gateway-secrets
  namespace: default
spec:
  provider: vault
  parameters:
    # The gateway speaks the Vault API, so the vault provider works unchanged.
    vaultAddress: "https://vault-gateway.vault-system:8200"
    # Kubernetes auth role (matches an entry under config.auth.roles).
    roleName: "default-role"
    # The gateway uses a self-signed certificate by default.
    vaultSkipTLSVerify: "true"
    objects: |
      - objectName: "db_password"
        secretPath: "secret/data/opus/workflow-engine"
        secretKey: "db_password"
      - objectName: "api_key"
        secretPath: "secret/data/opus/workflow-engine"
        secretKey: "api_key"
  # Optionally mirror the mounted secrets into a Kubernetes Secret.
  secretObjects:
    - secretName: workflow-engine-secrets
      type: Opaque
      data:
        - objectName: "db_password"
          key: db_password
        - objectName: "api_key"
          key: api_key
