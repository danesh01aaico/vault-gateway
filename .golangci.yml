version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - noctx
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    misspell:
      locale: US
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
          - gosec
          - unparam
          - noctx
          - bodyclose
        path: _test\.go
      - linters:
          - gosec
        path: _test\.go
        text: (G404|G101)
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/vault-gateway/vault-gateway
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
